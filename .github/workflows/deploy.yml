name: Flask CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  VERSION: v1.0.${{ github.run_number }}

jobs:

  build-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python -m pytest -v

    - name: Build Docker Image
      run: |
        docker build \
         -t flask-api:${{ env.VERSION }} .

    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: flask-api:${{ env.VERSION }}

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker Image
      run: |
        docker tag flask-api:${{ env.VERSION }} \
        ${{ secrets.DOCKER_USERNAME }}/flask-api:${{ env.VERSION }}

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-api:${{ env.VERSION }}

  deploy:
        needs: build-test

        runs-on: ubuntu-latest

        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4

          - name: Create Kind Cluster
            uses: helm/kind-action@v1

          - name: Setup Helm
            uses: azure/setup-helm@v4

          - name: Verify Cluster
            run: |
                kubectl cluster-info
                kubectl get nodes

          - name: Deploy
            run: |
                helm upgrade --install flask-api ./helm/flask-api \
                --set image.repository=${{ secrets.DOCKER_USERNAME }}/flask-api \
                --set image.tag=${{ env.VERSION }}

          - name: Verify Deployment
            run: |
                kubectl get pods
                kubectl get svc
          
          - name: Wait
            run: sleep 20

          - name: Smoke Test
            run: |
                kubectl port-forward service/flask-api-service 5000:5000 &
                sleep 5

                curl --fail http://localhost:5000/health

          - name: Rollback
            if: failure()
            run: |
                helm rollback flask-api